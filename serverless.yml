service: centinela-integridad
org: tu-org
useDotenv: true   

provider:
  name: aws
  runtime: python3.12
  region: us-east-1            
  memorySize: 1024
  timeout: 60                 
  iam:
    role: arn:aws:iam::TU_ACCOUNT_ID:role/LabRole
  environment:
    TABLE_NAME: ${env:TABLE_NAME}  

plugins:
  - serverless-python-requirements   

custom:
  pythonRequirements:
    slim: true   

functions:
  extractor:
    handler: extractor_lambda.handler
    environment:
      QUEUE_URL: ${env:QUEUE_URL}      
    events:
      - s3:
          bucket: processed-manuscripts-nina-2026   # <-- tu bucket existente
          event: s3:ObjectCreated:*
          rules:
            - suffix: .md
          existing: true   # NO crear el bucket: ya existe

  # ---------- Lambda (Worker LLM) ----------
  # Se dispara con los mensajes de la cola, en lotes de 25.
  worker:
    handler: worker_llm_lambda.handler
    environment:
      GROQ_API_KEY: ${env:GROQ_API_KEY}
      GROQ_MODEL: ${env:GROQ_MODEL}
      CONTACT_EMAIL: ${env:CONTACT_EMAIL}
    events:
      - sqs:
          arn: arn:aws:sqs:us-east-1:TU_ACCOUNT_ID:cola-de-lotes   # <-- ARN de tu cola
          batchSize: 25
          maximumBatchingWindow: 5
          functionResponseType: ReportBatchItemFailures   # reintento por referencia
          maximumConcurrency: 3   # limita Workers en paralelo para no saturar Groq (min 2)

# =====================================================================
